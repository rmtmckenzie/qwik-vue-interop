name: Publish to npm

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    name: Build, Test & Publish
    runs-on: ubuntu-latest
    environment: production

    # Crucial for Trusted Publishing (OIDC) and Provenance
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(npx playwright --version | cut -d' ' -f2)" >> $GITHUB_OUTPUT

      - name: Cache Playwright Browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.version }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright System Dependencies (Cache Hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Install Playwright Browsers & Deps (Cache Miss)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Build All Workspaces
        run: npm run build:all

      - name: Run Integration Tests
        run: npm run test

      - name: Publish to npm (via Trusted Publishing / OIDC)
        run: npm publish --workspace=qwik-vue-interop --provenance --access public
